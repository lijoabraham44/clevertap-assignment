# =============================================================================
# ClusterSecretStore — cluster-wide binding of External Secrets Operator (ESO)
# to AWS Secrets Manager.
#
# Auth: IRSA (jwt/serviceAccount) — ESO's controller service account assumes an
# IAM role scoped to read only the secret paths it needs. NO static AWS keys.
# Provisioned once per cluster (GitOps), then every ExternalSecret references it.
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            # The ESO controller SA, annotated with eks.amazonaws.com/role-arn
            # (IAM role created by the Section 1 EKS module's irsa_roles).
            name: external-secrets
            namespace: external-secrets
---
# Reference IAM policy (provisioned in Terraform, shown here for context) that
# the ESO IRSA role would carry — least privilege, only the app's secret paths:
#
# {
#   "Version": "2012-10-17",
#   "Statement": [{
#     "Effect": "Allow",
#     "Action": ["secretsmanager:GetSecretValue", "secretsmanager:DescribeSecret"],
#     "Resource": [
#       "arn:aws:secretsmanager:us-east-1:777788889999:secret:prod/event-ingestion/*"
#     ]
#   }]
# }
