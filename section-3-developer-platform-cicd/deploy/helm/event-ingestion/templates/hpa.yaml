{{- if .Values.autoscaling.enabled -}}
# HPA targets the Argo Rollout (scaleTargetRef kind: Rollout), so autoscaling and
# progressive delivery coexist. Sized for 10–50x campaign spikes via maxReplicas.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "event-ingestion.fullname" . }}
  labels:
    {{- include "event-ingestion.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: {{ include "event-ingestion.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
