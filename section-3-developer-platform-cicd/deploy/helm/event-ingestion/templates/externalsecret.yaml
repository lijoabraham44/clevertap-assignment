{{- if .Values.externalSecret.enabled -}}
# =============================================================================
# ExternalSecret — runtime secret injection (NO secret values in this repo).
#
# External Secrets Operator (ESO) reads the named secrets from AWS Secrets
# Manager (authenticating via the IRSA role on the ClusterSecretStore) and
# materializes them into a normal Kubernetes Secret. The Rollout consumes that
# Secret via envFrom. The repo only ever contains secret *names/paths*.
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "event-ingestion.fullname" . }}
  labels:
    {{- include "event-ingestion.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef }}
    kind: ClusterSecretStore
  target:
    # The K8s Secret ESO creates/keeps in sync (referenced by the Rollout).
    name: {{ include "event-ingestion.fullname" . }}-secrets
    creationPolicy: Owner
  data:
    {{- range .Values.externalSecret.data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteRef.key }}
        property: {{ .remoteRef.property }}
    {{- end }}
{{- end }}
