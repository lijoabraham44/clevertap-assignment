{{- if .Values.serviceAccount.create -}}
# IRSA-annotated service account. The eks.amazonaws.com/role-arn annotation is
# what binds the pod to an IAM role via the OIDC provider — no static AWS keys.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  labels:
    {{- include "event-ingestion.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.roleArn }}
  annotations:
    eks.amazonaws.com/role-arn: {{ . }}
  {{- end }}
{{- end }}
