# Base values (shared defaults). Environment overlays in values-<env>.yaml only
# set what differs. The CI pipeline injects image.tag = commit SHA at deploy time.

image:
  repository: 111122223333.dkr.ecr.us-east-1.amazonaws.com/event-ingestion
  tag: "" # set by CI to the commit SHA — never hardcode / never :latest
  pullPolicy: IfNotPresent

replicaCount: 3

serviceAccount:
  # IRSA: the IAM role ARN provisioned by the Section 1 EKS module (irsa_roles).
  # This is how the pod (and ESO) get AWS permissions WITHOUT static keys.
  create: true
  name: event-ingestion
  roleArn: "" # e.g. arn:aws:iam::<acct>:role/<cluster>-irsa-event-ingestion

containerPort: 8080

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

# Pod-level resilience knobs (referenced by the runbook in Section 2).
podDisruptionBudget:
  enabled: true
  minAvailable: 2

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 30
  targetCPUUtilizationPercentage: 70

probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10
  readiness:
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 5

# ---- Secrets (NO values here, only references) -------------------------------
# ESO syncs these keys from AWS Secrets Manager into a K8s Secret at runtime.
externalSecret:
  enabled: true
  secretStoreRef: aws-secrets-manager        # ClusterSecretStore name
  refreshInterval: 1h
  # remoteKey = the Secrets Manager secret name; mapped to env var name.
  data:
    - secretKey: KAFKA_SASL_PASSWORD
      remoteRef:
        key: prod/event-ingestion/kafka
        property: sasl_password
    - secretKey: DB_PASSWORD
      remoteRef:
        key: prod/event-ingestion/db
        property: password

# Non-secret config (safe to live in values).
env:
  KAFKA_BOOTSTRAP: kafka-bootstrap.kafka.svc:9092
  KAFKA_TOPIC: events.raw
  LOG_LEVEL: info

# ---- Argo Rollouts canary strategy ------------------------------------------
rollout:
  # Canary steps: 10% -> (analysis) -> 50% -> (analysis) -> 100%.
  canary:
    steps:
      - setWeight: 10
      - pause: { duration: 5m }      # bake time; analysis runs in background
      - setWeight: 50
      - pause: { duration: 5m }
      - setWeight: 100
  analysis:
    # Names of AnalysisTemplates that gate each step (auto-rollback on failure).
    templates:
      - success-rate
      - latency-p99
    startingStep: 1   # begin analysis from the first canary weight
