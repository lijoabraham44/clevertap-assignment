# =============================================================================
# PR stage — runs on every pull request.
#
# Purpose: fast, security-gated feedback BEFORE merge. No deployment happens
# here. Produces one immutable artifact (image tagged with the commit SHA) that
# staging and production will later promote unchanged (build once, promote same).
#
# Gates (all must pass to merge):
#   lint -> unit tests -> build image -> SAST (Semgrep) + image CVE scan (Trivy)
#   -> push image:<sha> to ECR.
#
# Security: authenticates to AWS via OIDC (short-lived creds, no static keys).
# See docs/3a-cicd-pipeline-design.md for the rationale.
# =============================================================================
name: pr

on:
  pull_request:
    branches: [main]

# Cancel superseded runs for the same PR to save runner minutes.
concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write        # required for AWS OIDC federation
  pull-requests: write   # to post scan summaries
  security-events: write # to upload SARIF to GitHub code scanning

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: event-ingestion
  # Resolve the immutable image reference once and reuse everywhere.
  IMAGE_TAG: ${{ github.event.pull_request.head.sha }}

jobs:
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (code + chart)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
      - name: Helm lint
        uses: azure/setup-helm@v4
      - run: helm lint deploy/helm/event-ingestion --values deploy/helm/event-ingestion/values-staging.yaml

  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Run tests with coverage
        run: go test ./... -race -covermode=atomic -coverprofile=coverage.out
      - name: Enforce coverage threshold
        run: |
          pct=$(go tool cover -func=coverage.out | awk '/total:/ {print substr($3, 1, length($3)-1)}')
          echo "coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN { exit (p < 70) }' || { echo "coverage ${pct}% < 70% threshold"; exit 1; }
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  # ---------------------------------------------------------------------------
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/default
            p/security-audit
            p/secrets
            p/dockerfile
        # Fails the job on findings at or above the configured severity.

  # ---------------------------------------------------------------------------
  build-scan-push:
    name: Build, scan & push image
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, sast]   # don't waste a build if basics fail
    outputs:
      image: ${{ steps.meta.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC, no static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::111122223333:role/gha-ci-event-ingestion
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image reference
        id: meta
        run: echo "image=${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      # Build locally first (load) so we can scan BEFORE pushing.
      - name: Build image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Trivy image scan (CVEs)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.meta.outputs.image }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"          # fail the PR on HIGH/CRITICAL vulnerabilities
          ignore-unfixed: true

      - name: Upload Trivy SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # Only push AFTER the image passed scanning.
      - name: Push image to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha

      - name: PR summary
        run: |
          echo "### Image published :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.meta.outputs.image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- digest: \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
